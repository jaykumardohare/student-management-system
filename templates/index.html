<!DOCTYPE html>
<html>
<head>
<title>Student System</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<a href="/logout" class="btn btn-danger">Logout</a>
<body class="bg-light">

<div class="container mt-5">

<h2 class="text-center mb-4">🎓 Student Management</h2>

<div class="card p-4 shadow mb-4">
<form action="/add" method="POST" class="row g-3">

<input name="name" class="form-control" placeholder="Name" required>
<input name="roll" class="form-control" placeholder="Roll" required>
<input name="enroll" class="form-control" placeholder="Enrollment" required>
<input type="date" name="dob" class="form-control" required>

<input type="number" name="math" class="form-control" placeholder="Math" required>
<input type="number" name="science" class="form-control" placeholder="Science" required>
<input type="number" name="english" class="form-control" placeholder="English" required>

<button class="btn btn-success">Add Student</button>

</form>
</div>

<table class="table table-bordered text-center">
<tr class="table-dark">
<th>Name</th><th>Roll</th><th>Total</th><th>%</th><th>Grade</th><th>Action</th>
</tr>

{% for s in students %}
<tr>
<td>{{ s.name }}</td>
<td>{{ s.roll }}</td>
<td>{{ s.total }}</td>
<td>{{ s.percentage }}</td>
<td>{{ s.grade }}</td>
<td>
<a href="/profile/{{ s.roll }}" class="btn btn-info btn-sm">View</a>
<a href="/edit/{{ s.roll }}" class="btn btn-warning btn-sm">Edit</a>
<a href="/delete/{{ s.roll }}" class="btn btn-danger btn-sm">Delete</a>
</td>
</tr>
{% endfor %}

</table>

</div>
</body>
</html>
