<!DOCTYPE html>
<html>
<head>
<title>Student Management</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
body {
    font-family: Arial;
    background: linear-gradient(to right, #667eea, #764ba2);
    text-align: center;
}

.container {
    background: white;
    padding: 20px;
    width: 80%;
    margin: auto;
    border-radius: 10px;
}

input, button {
    padding: 10px;
    margin: 5px;
}

button {
    background: green;
    color: white;
}

table {
    width: 100%;
    margin-top: 20px;
    border-collapse: collapse;
}

th {
    background: blue;
    color: white;
}

th, td {
    padding: 10px;
    border: 1px solid #ddd;
}

.topper {
    background: #ffeeba;
}

.delete {
    background: red;
    color: white;
    padding: 5px;
}

.edit {
    background: orange;
    color: white;
    padding: 5px;
}
</style>

</head>

<body>

<div class="container">

<h2>🎓 Student Management System</h2>

<h3>Total Students: {{ students|length }}</h3>

<form action="/add" method="POST">
    <input type="text" name="name" placeholder="Name" required>
    <input type="text" name="roll" placeholder="Roll No" required>
    <input type="number" name="marks" placeholder="Marks" required>
    <button><i class="fas fa-user-plus"></i> Add</button>
</form>

<form method="GET">
    <input type="text" name="search" placeholder="Search">
    <button>Search</button>
</form>

<table>
<tr>
<th>Name</th>
<th>Roll</th>
<th>Marks</th>
<th>%</th>
<th>Grade</th>
<th>Action</th>
</tr>

{% for s in students %}
<tr class="{% if loop.index == 1 %}topper{% endif %}">
<td>{{ s.name }}</td>
<td>{{ s.roll }}</td>
<td>{{ s.marks }}</td>
<td>{{ s.percentage }}</td>
<td>{{ s.grade }}</td>
<td>
<a href="/edit/{{ s.roll }}" class="edit">Edit</a>
<a href="/delete/{{ s.roll }}" class="delete" onclick="return confirm('Delete?')">Delete</a>
</td>
</tr>
{% endfor %}

</table>

</div>

</body>
</html>
