<!DOCTYPE html>
<html>
<head>
<title>Edit</title>
</head>

<body style="text-align:center; font-family:Arial;">

<h2>Edit Student</h2>

<form action="/update/{{ student.roll }}" method="POST">
    <input type="text" name="name" value="{{ student.name }}" required><br><br>
    <input type="number" name="marks" value="{{ student.marks }}" required><br><br>
    <button>Update</button>
</form>

<br>
<a href="/">Back</a>

</body>
</html>
